name: TrollStoreDarkSword
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  SWIFT_VERSION: "6.0"
  TARGETED_DEVICE_FAMILY: "1,2"

targets:
  TrollStoreDarkSword:
    type: application
    platform: iOS
    sources:
      - Core
      - Services
      - UI
      - path: Vendored/kexploit
      - path: Vendored/kexploit/pe
      - path: Vendored/kexploit/TaskRop
      - path: Vendored/ChOma
      - path: "."
        includes:
          - "*.swift"
        excludes:
          - "Package.swift"
        type: group
        createIntermediateGroups: false
    info:
      path: Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.trollstoreclone
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""
        ARCHS: "arm64 arm64e"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_OBJC_BRIDGING_HEADER: TrollStoreDarkSword-Bridging-Header.h
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        GCC_OPTIMIZATION_LEVEL: 0
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Vendored/kexploit"
          - "$(SRCROOT)/Vendored/kexploit/pe"
          - "$(SRCROOT)/Vendored/kexploit/TaskRop"
          - "$(SRCROOT)/Vendored/lib"
          - "$(SRCROOT)/Vendored/ChOma"
        OTHER_LDFLAGS:
          - "-L$(SRCROOT)/Vendored/lib"
          - "-lxpf"
          - "-lgrabkernel2"
        OTHER_CFLAGS:
          - "-Wno-deprecated-declarations"
    postBuildScripts:
      - name: Embed Dylibs
        script: |
          mkdir -p "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          cp -f "${SRCROOT}/Vendored/lib/libxpf.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/"
          cp -f "${SRCROOT}/Vendored/lib/libgrabkernel2.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/"
