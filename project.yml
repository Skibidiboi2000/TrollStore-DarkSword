name: TrollStoreDarkSword
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  TARGETED_DEVICE_FAMILY: "1,2"

targets:
  TrollStoreDarkSword:
    type: application
    platform: iOS
    sources:
      - App
      - Coordinator
      - Core
      - UI
      - path: Vendored/darksword
      - path: Vendored/pe
      - path: Vendored/TaskRop
      - path: Vendored/ChOma
    info:
      path: Info.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: IPA Archive
            LSHandlerRank: Owner
            LSItemContentTypes:
              - public.data
              - public.item
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.trollstoreclone
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""
        ARCHS: "arm64 arm64e"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        GCC_OPTIMIZATION_LEVEL: 0
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Vendored/darksword"
          - "$(SRCROOT)/Vendored/pe"
          - "$(SRCROOT)/Vendored/TaskRop"
          - "$(SRCROOT)/Vendored/lib"
          - "$(SRCROOT)/Vendored/ChOma"
          - "$(SRCROOT)/Vendored"
        OTHER_LDFLAGS:
          - "-L$(SRCROOT)/Vendored/lib"
          - "-lxpf"
          - "-lgrabkernel2"
          - "-lz"
        OTHER_CFLAGS:
          - "-Wno-deprecated-declarations"
    postBuildScripts:
      - name: Embed Dylibs
        script: |
          mkdir -p "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}"
          cp -f "${SRCROOT}/Vendored/lib/libxpf.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/"
          cp -f "${SRCROOT}/Vendored/lib/libgrabkernel2.dylib" "${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/"
        outputFiles:
          - "$(BUILT_PRODUCTS_DIR)/$(FRAMEWORKS_FOLDER_PATH)/libxpf.dylib"
          - "$(BUILT_PRODUCTS_DIR)/$(FRAMEWORKS_FOLDER_PATH)/libgrabkernel2.dylib"
